{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}المحادثات | نوافذ{% endblock %}
{% block page_id %}chats{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'mobile_web/css/chats.css' %}">
{% endblock %}

{% block content %}
  <div class="nw-container">
    <div class="nw-chats-header">
      <h1>المحادثات</h1>
    </div>

    <!-- Search -->
    <div class="nw-chats-search">
      <span class="material-icons-round">search</span>
      <input type="text" id="chat-search" placeholder="بحث في المحادثات...">
    </div>

    <!-- Filter Chips -->
    <div class="nw-chats-filters" id="chat-filters">
      <button class="nw-chat-chip is-active" data-filter="all">الكل</button>
      <button class="nw-chat-chip" data-filter="unread">غير مقروءة</button>
      <button class="nw-chat-chip" data-filter="favorite">مفضلة</button>
      <button class="nw-chat-chip" data-filter="clients">عملاء</button>
      <button class="nw-chat-chip" data-filter="recent">الأحدث</button>
    </div>

    <!-- Thread List -->
    <div id="chat-list" class="nw-chat-list">
      <div class="nw-chats-loading"></div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{% static 'mobile_web/js/chats.js' %}"></script>
{% endblock %}
