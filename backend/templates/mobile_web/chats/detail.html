{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}محادثة | نوافذ{% endblock %}
{% block page_id %}chat-detail{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'mobile_web/css/chat-detail.css' %}">
{% endblock %}

{% block content %}
  <div class="nw-chat-detail">
    <!-- Header -->
    <div class="nw-chat-topbar">
      <button class="nw-chat-back" id="btn-back" title="رجوع">
        <span class="material-icons-round">arrow_forward</span>
      </button>
      <div class="nw-chat-peer-avatar" id="peer-avatar"></div>
      <div class="nw-chat-peer-info">
        <p class="nw-chat-peer-name" id="peer-name">محادثة</p>
        <p class="nw-chat-peer-status" id="peer-status"></p>
      </div>
    </div>

    <!-- Messages -->
    <div class="nw-chat-messages" id="messages-area">
      <div class="nw-chat-loading"></div>
    </div>

    <!-- Input Bar -->
    <div class="nw-chat-input-bar">
      <button class="nw-chat-attach-btn" id="btn-attach" title="مرفق">
        <span class="material-icons-round">attach_file</span>
      </button>
      <textarea class="nw-chat-input-field" id="msg-input" rows="1" placeholder="اكتب رسالة..."></textarea>
      <button class="nw-chat-send-btn" id="btn-send" title="إرسال" disabled>
        <span class="material-icons-round">send</span>
      </button>
    </div>
    <input type="file" id="file-input" hidden>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{% static 'mobile_web/js/chat-detail.js' %}"></script>
{% endblock %}
