{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}البحث عن مزود خدمة | نوافذ{% endblock %}
{% block page_id %}search-provider{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'mobile_web/css/search-provider.css' %}">
{% endblock %}

{% block content %}
  <section class="nw-sp">
    <div class="nw-sp-header">
      <h1>البحث عن مزود خدمة</h1>
    </div>
    <div class="nw-sp-search">
      <span class="material-icons-round">search</span>
      <input id="sp-search" type="search" placeholder="ابحث عن اسم أو تخصص...">
    </div>
    <div class="nw-sp-cats" id="sp-cats"></div>
    <div class="nw-sp-sortbar">
      <span class="count" id="sp-count"></span>
      <div style="position:relative">
        <button class="nw-sp-sort-btn" id="sp-sort-btn"><span class="material-icons-round">sort</span>ترتيب</button>
        <div class="nw-sp-sort-menu" id="sp-sort-menu">
          <button class="nw-sp-sort-opt is-active" data-sort="">الافتراضي</button>
          <button class="nw-sp-sort-opt" data-sort="rating">الأعلى تقييماً</button>
          <button class="nw-sp-sort-opt" data-sort="completed">الأكثر إنجازاً</button>
          <button class="nw-sp-sort-opt" data-sort="followers">الأكثر متابعة</button>
        </div>
      </div>
    </div>
    <div id="sp-grid" class="nw-sp-grid"></div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{% static 'mobile_web/js/search-provider.js' %}"></script>
{% endblock %}
