{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}المراجعات | نوافذ{% endblock %}
{% block page_id %}provider-reviews{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'mobile_web/css/provider-reviews.css' %}">
{% endblock %}

{% block content %}
  <section class="nw-prov-rev">
    <h1>المراجعات</h1>

    <!-- Rating Summary -->
    <div class="nw-rev-summary" id="rev-summary">
      <div class="nw-rev-overall">
        <div class="big" id="rev-avg">0</div>
        <div class="stars" id="rev-stars"></div>
        <div class="count" id="rev-count">0 تقييم</div>
      </div>
      <div class="nw-rev-bars" id="rev-bars"></div>
    </div>

    <div class="nw-rev-sort">
      <select id="rev-sort">
        <option value="newest">الأحدث</option>
        <option value="highest">الأعلى تقييماً</option>
        <option value="lowest">الأقل تقييماً</option>
      </select>
    </div>

    <div id="rev-list" class="nw-rev-list"></div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{% static 'mobile_web/js/provider-reviews.js' %}"></script>
{% endblock %}
