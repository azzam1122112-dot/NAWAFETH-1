{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}الإشعارات | نوافذ{% endblock %}
{% block page_id %}notifications{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'mobile_web/css/notifications.css' %}">
{% endblock %}

{% block content %}
  <div class="nw-container">
    <!-- Header -->
    <div class="nw-notif-header">
      <h1>الإشعارات</h1>
      <div class="nw-notif-actions">
        <button class="nw-notif-action-btn" id="btn-mark-all" title="قراءة الكل">
          <span class="material-icons-round">done_all</span>
          قراءة الكل
        </button>
        <button class="nw-notif-action-btn" id="btn-delete-old" title="حذف القديمة">
          <span class="material-icons-round">delete_sweep</span>
        </button>
      </div>
    </div>

    <!-- Notification List -->
    <div id="notif-list" class="nw-notif-list">
      <div class="nw-notif-loading" id="notif-loading"></div>
    </div>

    <!-- Load More -->
    <div class="nw-notif-load-more" id="load-more-wrap" hidden>
      <button class="nw-secondary-btn" id="btn-load-more" style="font-size:12px">تحميل المزيد</button>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{% static 'mobile_web/js/notifications.js' %}"></script>
{% endblock %}
