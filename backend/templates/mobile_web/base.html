{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}نوافذ ويب{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'mobile_web/css/theme.css' %}">
  {% block styles %}{% endblock %}
</head>
<body data-page="{% block page_id %}base{% endblock %}">
  <header class="nw-topbar">
    <div class="nw-container nw-topbar-content">
      <a class="nw-brand" href="{% url 'mobile_web:home' %}">نوافذ</a>
      <nav class="nw-nav">
        <a href="{% url 'mobile_web:home' %}">الرئيسية</a>
        <a href="{% url 'mobile_web:provider_dashboard' %}">لوحة المزود</a>
        <a href="{% url 'mobile_web:login' %}" id="nav-auth-link">تسجيل الدخول</a>
        <button id="nav-logout-btn" class="nw-link-btn" type="button" hidden>تسجيل الخروج</button>
      </nav>
    </div>
  </header>

  <main class="nw-page">
    {% block content %}{% endblock %}
  </main>

  <script>
    window.NAWAFETH_WEB_CONFIG = {
      apiBaseUrl: window.location.origin,
      urls: {
        home: "{% url 'mobile_web:home' %}",
        login: "{% url 'mobile_web:login' %}",
        otp: "{% url 'mobile_web:otp' %}",
        signup: "{% url 'mobile_web:signup' %}",
        providerDashboard: "{% url 'mobile_web:provider_dashboard' %}"
      }
    };
  </script>
  <script src="{% static 'mobile_web/js/core/api-client.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
