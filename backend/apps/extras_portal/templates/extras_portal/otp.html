<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>رمز التحقق - بوابة الخدمات الإضافية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #8f2e8a 0%, #5e35b1 100%); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden">
    <div class="gradient-bg px-6 py-8">
      <div class="text-2xl font-bold text-white">رمز التحقق</div>
      <div class="text-sm text-white/80 mt-1">تم إرسال رمز تحقق إلى {{ phone }}</div>
    </div>
    <div class="p-6">
      {% if dev_accept_any %}
        <div class="mb-4 px-4 py-3 rounded-xl bg-amber-50 text-amber-900 border border-amber-100 text-sm">
          وضع التطوير: يمكنك إدخال أي 4 أرقام.
        </div>
      {% endif %}

      {% if messages %}
        <div class="space-y-2 mb-4">
          {% for message in messages %}
            <div class="px-4 py-3 rounded-xl {% if message.tags == 'error' %}bg-red-50 text-red-800 border border-red-100{% else %}bg-gray-50 text-gray-800 border border-gray-100{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">الرمز (4 أرقام)</label>
          <input name="code" value="{{ form.code.value|default:'' }}" inputmode="numeric" maxlength="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-200" placeholder="0000">
          {% if form.code.errors %}<div class="text-sm text-red-600 mt-1">{{ form.code.errors.0 }}</div>{% endif %}
        </div>
        <button class="w-full inline-flex items-center justify-center px-4 py-3 rounded-xl gradient-bg text-white font-bold hover:opacity-95">تأكيد</button>
      </form>

      <div class="mt-4 text-center">
        <a href="{% url 'extras_portal:login' %}" class="text-sm text-gray-600 hover:text-gray-900">رجوع</a>
      </div>
    </div>
  </div>
</body>
</html>
